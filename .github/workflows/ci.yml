name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Mobile unit tests
        run: npm ci && npm test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: backend/build.gradle.kts
      - name: Backend tests (includes OpenAPI drift guard)
        working-directory: backend
        run: ./gradlew test --no-daemon

  backend-staging-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Full staging API smoke
        env:
          JWT_SECRET: staging-compose-secret-at-least-32-chars!!
        run: |
          ./scripts/staging-up.sh
          ./scripts/verify-staging-api.sh --full
      - name: Tear down staging stack
        if: always()
        run: docker compose down -v --remove-orphans
