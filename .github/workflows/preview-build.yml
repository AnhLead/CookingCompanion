name: Preview Build

# Board-triggered EAS preview build — no agent workspace token required.
# Required GitHub repo secrets: EXPO_TOKEN, EXPO_PUBLIC_API_BASE_URL
# Optional: run ./scripts/eas-preview-setup.sh locally once to link the Expo project.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: android
        type: choice
        options:
          - android
          - ios

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Link Expo project (first run only)
        run: |
          if ! grep -qE '"projectId"|"eas"' app.json 2>/dev/null; then
            eas init --non-interactive
          fi

      - name: Build preview (${{ inputs.platform }})
        run: eas build --profile preview --platform ${{ inputs.platform }} --non-interactive
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
