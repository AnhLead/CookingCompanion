# Production (SPRING_PROFILES_ACTIVE=prod): native clients; no dev auth shortcuts; OpenAPI UI off.
#
# vs default dev: allow-x-user-id and parse-jwt-without-verification are true in application.yml only for local use.
# vs staging: same security as here; staging keeps springdoc enabled for QA (see application-staging.yml).
#
# Env vars (operators):
# - DATABASE_URL, DATABASE_USER, DATABASE_PASSWORD, PORT
# - CORS_ALLOWED_ORIGIN_PATTERNS — comma-separated patterns; empty = no browser CORS (typical for mobile-only).
# - RECIPE_AI_GENERATIVE_ENABLED, OPENAI_API_KEY, OPENAI_BASE_URL, OPENAI_MODEL — optional generative recipe path.
# - IMPORT_PREVIEW_RATE_LIMIT_PER_MINUTE, IMPORT_COMMIT_RATE_LIMIT_PER_MINUTE — optional Resilience4j overrides.

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

app:
  security:
    allow-x-user-id: false
    parse-jwt-subject-without-verification: false
  cors:
    # Empty unless operators set CORS_ALLOWED_ORIGIN_PATTERNS (comma-separated patterns).
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}

resilience4j:
  ratelimiter:
    instances:
      importPreview:
        limitForPeriod: ${IMPORT_PREVIEW_RATE_LIMIT_PER_MINUTE:30}
        limitRefreshPeriod: 1m
        timeoutDuration: 0s
      importCommit:
        limitForPeriod: ${IMPORT_COMMIT_RATE_LIMIT_PER_MINUTE:15}
        limitRefreshPeriod: 1m
        timeoutDuration: 0s
