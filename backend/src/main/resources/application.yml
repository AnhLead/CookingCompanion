spring:
  application:
    name: cooking-companion-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cooking_companion}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

# Browser CORS for /api/** — comma-separated patterns. Prod profile defaults to empty (native clients only).
app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

resilience4j:
  ratelimiter:
    instances:
      importPreview:
        limitForPeriod: 120
        limitRefreshPeriod: 1m
        timeoutDuration: 0s
      importCommit:
        limitForPeriod: 60
        limitRefreshPeriod: 1m
        timeoutDuration: 0s

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} correlationId=%X{correlationId:-} thread=%thread level=%5level logger=%logger{36} - %msg%n"
